services:
  hodhod-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hodhod
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hodhod}
      POSTGRES_DB: hodhod
    volumes:
      - hodhod_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hodhod"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hodhod-app:
    image: ${HODHOD_IMAGE:-ghcr.io/mrchatam/hodhod:latest}
    pull_policy: always
    depends_on:
      hodhod-db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_DSN: postgres://hodhod:${DB_PASSWORD:-hodhod}@hodhod-db:5432/hodhod?sslmode=disable
      RUN_MIGRATIONS: "true"
      HTTP_ADDR: ":${HTTP_PORT:-8080}"
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/hodhod", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  hodhod_pg:
