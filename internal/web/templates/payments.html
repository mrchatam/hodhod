{{define "payments.html"}}{{template "layout" .}}{{end}}
{{define "content"}}
<h1 class="text-2xl font-bold mb-4">Pending Payments</h1>
<ul>{{range .Payments}}
<li class="mb-2 p-2 bg-white rounded">
  #{{.ID}} bot={{.BotID}} amount={{.AmountToman}}
  <form class="inline" method="post" action="/payments/{{.BotID}}/{{.ID}}/approve">
    <input type="hidden" name="_csrf" value="{{$.CSRF}}">
    <button>Approve</button>
  </form>
  <form class="inline" method="post" action="/payments/{{.BotID}}/{{.ID}}/reject">
    <input type="hidden" name="_csrf" value="{{$.CSRF}}">
    <button>Reject</button>
  </form>
</li>
{{end}}</ul>
{{end}}
