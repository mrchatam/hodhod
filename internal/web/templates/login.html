<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Hodhod Login</title>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<form method="post" action="/login" class="bg-white p-8 rounded shadow w-96">
  <h1 class="text-2xl font-bold mb-4">Hodhod Admin</h1>
  <label class="block mb-2">Username<input name="username" class="border w-full p-2" required></label>
  <label class="block mb-4">Password<input name="password" type="password" class="border w-full p-2" required></label>
  <button class="bg-blue-600 text-white px-4 py-2 rounded w-full">Login</button>
</form>
</body></html>
