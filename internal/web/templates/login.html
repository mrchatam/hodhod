<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hodhod Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-slate-50 flex items-center justify-center">
<form method="post" action="/login" class="bg-white p-8 rounded-2xl shadow-lg border border-slate-200 w-full max-w-sm">
  <h1 class="text-2xl font-bold text-brand-600 mb-1">Hodhod</h1>
  <p class="text-sm text-slate-500 mb-6">Sales panel sign in</p>
  {{if .Error}}<p class="text-red-600 text-sm mb-4">Invalid credentials</p>{{end}}
  <label class="block text-sm font-medium mb-4">Username<input name="username" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5" required autofocus></label>
  <label class="block text-sm font-medium mb-6">Password<input name="password" type="password" class="mt-1 w-full border border-slate-300 rounded-lg p-2.5" required></label>
  <button class="w-full bg-brand-600 text-white py-2.5 rounded-lg font-medium hover:bg-brand-700">Sign in</button>
</form>
</body></html>
