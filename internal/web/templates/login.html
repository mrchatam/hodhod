<!DOCTYPE html>
<html lang="fa" dir="rtl" class="h-full" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .Lang}}{{T .Lang "login.title"}}{{else}}ورود{{end}}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script>(function(){if(window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.classList.add('dark');})();</script>
</head>
<body class="min-h-full flex items-center justify-center p-4">
  <div class="card w-full max-w-md p-8">
    <h1 class="text-2xl font-bold text-center text-brand-600 mb-6">{{if .Lang}}{{T .Lang "app.name"}}{{else}}هدهد{{end}}</h1>
    {{if .Error}}<div class="alert-err mb-4">{{if .Lang}}{{T .Lang "login.error"}}{{else}}نام کاربری یا رمز اشتباه است{{end}}</div>{{end}}
    <form method="post" action="/login" class="space-y-4">
      <div class="form-field">
        <label class="form-label">{{if .Lang}}{{T .Lang "login.username"}}{{else}}نام کاربری{{end}}</label>
        <input type="text" name="username" class="form-input" required autofocus autocomplete="username">
      </div>
      <div class="form-field">
        <label class="form-label">{{if .Lang}}{{T .Lang "login.password"}}{{else}}رمز عبور{{end}}</label>
        <input type="password" name="password" class="form-input" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-full">{{if .Lang}}{{T .Lang "login.submit"}}{{else}}ورود{{end}}</button>
    </form>
  </div>
</body>
</html>
