{{define "agents.html"}}{{template "layout" .}}{{end}}
{{define "content"}}
<h1 class="text-2xl font-bold mb-4">Agents</h1>
<ul class="mb-6">{{range .Agents}}<li>{{.Name}} ({{.Status}})</li>{{end}}</ul>
<form method="post" action="/master/agents" class="bg-white p-4 rounded shadow">
  <input type="hidden" name="_csrf" value="{{.CSRF}}">
  <input name="name" placeholder="Agent name" class="border p-2 mr-2" required>
  <button class="bg-blue-600 text-white px-4 py-2 rounded">Add</button>
</form>
{{end}}
