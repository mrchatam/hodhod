{{define "layout"}}<!DOCTYPE html>
<html lang="{{if .Lang}}{{.Lang}}{{else}}en{{end}}" dir="{{if .IsRTL}}rtl{{else}}ltr{{end}}" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hodhod</title>
  <style>
    .btn{display:inline-flex;align-items:center;justify-content:center;font-weight:500;border-radius:0.5rem;cursor:pointer;text-decoration:none;border:1px solid transparent;line-height:1.25}
    .btn-primary{background:#4f46e5;color:#fff;padding:0.5rem 1rem;border-color:#4f46e5}
    .btn-primary:hover{background:#4338ca;border-color:#4338ca}
    .btn-secondary{background:#fff;color:#4f46e5;padding:0.5rem 1rem;border-color:#4f46e5}
    .btn-secondary:hover{background:#eef2ff}
    .btn-danger{background:#fff;color:#dc2626;padding:0.5rem 1rem;border-color:#dc2626}
    .btn-danger:hover{background:#fef2f2}
    .btn-success{background:#fff;color:#059669;padding:0.375rem 0.75rem;border-color:#059669;font-size:0.75rem}
    .btn-success:hover{background:#ecfdf5}
    .btn-warning{background:#fff;color:#d97706;padding:0.375rem 0.75rem;border-color:#d97706;font-size:0.75rem}
    .btn-warning:hover{background:#fffbeb}
    .btn-muted{background:#fff;color:#64748b;padding:0.375rem 0.75rem;border-color:#cbd5e1;font-size:0.75rem}
    .btn-muted:hover{background:#f8fafc}
    .btn-sm{padding:0.25rem 0.625rem;font-size:0.75rem}
    .btn-link{background:transparent;border:none;color:#4f46e5;padding:0.25rem 0.5rem;font-size:0.875rem}
    .btn-link:hover{text-decoration:underline}
    .btn-link-danger{color:#dc2626}
    .form-field{display:block}
    .form-label{font-size:0.875rem;font-weight:500;color:#334155}
    .form-input{margin-top:0.25rem;width:100%;border:1px solid #cbd5e1;border-radius:0.5rem;padding:0.5rem;font-size:0.875rem}
    .form-hint{margin-top:0.25rem;font-size:0.75rem;color:#64748b;line-height:1.4}
    .form-hint code{background:#f1f5f9;padding:0.125rem 0.25rem;border-radius:0.25rem;font-size:0.7rem}
    .badge{display:inline-block;padding:0.125rem 0.5rem;border-radius:9999px;font-size:0.75rem;font-weight:500}
    .badge-active{background:#d1fae5;color:#047857}
    .badge-disabled{background:#f1f5f9;color:#64748b}
    .alert-ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;padding:0.5rem 0.75rem;border-radius:0.5rem;font-size:0.875rem}
    .alert-err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;padding:0.5rem 0.75rem;border-radius:0.5rem;font-size:0.875rem}
    .alert-info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;padding:0.5rem 0.75rem;border-radius:0.5rem;font-size:0.875rem}
    .btn.htmx-request,.btn[aria-busy="true"]{opacity:.65;pointer-events:none}
    .btn .spinner{display:none;width:0.875rem;height:0.875rem;border:2px solid currentColor;border-right-color:transparent;border-radius:9999px;margin-right:0.375rem;animation:spin .6s linear infinite}
    .btn.htmx-request .spinner,.btn[aria-busy="true"] .spinner{display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .filter-chip{display:inline-flex;align-items:center;gap:0.25rem;background:#eef2ff;color:#4338ca;padding:0.125rem 0.5rem;border-radius:9999px;font-size:0.75rem}
    .inbound-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(10rem,1fr));gap:0.5rem;max-height:12rem;overflow-y:auto;padding:0.5rem;border:1px solid #e2e8f0;border-radius:0.5rem;background:#f8fafc}
    .inbound-grid label{display:flex;align-items:center;gap:0.375rem;font-size:0.8125rem;cursor:pointer}
    .panel-card{border:1px solid #e2e8f0;border-radius:0.75rem;background:#fff;padding:1rem}
    #mobile-nav{display:none}
    #mobile-nav.open{display:block}
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{500:'#6366f1',600:'#4f46e5',700:'#4338ca'}}}}}</script>
</head>
<body class="h-full bg-slate-50 text-slate-800">
<div class="min-h-full flex">
  {{template "sidebar" .}}
  <div class="flex-1 flex flex-col min-w-0">
    {{template "topbar" .}}
    <main class="flex-1 p-6 max-w-7xl w-full mx-auto">
      {{template "flash" .}}
      {{template "content" .}}
    </main>
  </div>
</div>
<script>
document.getElementById('nav-toggle')?.addEventListener('click', function() {
  document.getElementById('mobile-nav')?.classList.toggle('open');
});
document.body.addEventListener('submit', function(e) {
  var form = e.target;
  if (!(form instanceof HTMLFormElement)) return;
  if (form.dataset.noBusy === '1') return;
  var btn = form.querySelector('button[type="submit"]');
  if (!btn || btn.getAttribute('aria-busy') === 'true') return;
  btn.setAttribute('aria-busy', 'true');
  var label = btn.querySelector('.btn-label');
  if (label && btn.dataset.busyText) label.textContent = btn.dataset.busyText;
});
document.body.addEventListener('htmx:beforeRequest', function(e) {
  var elt = e.detail.elt;
  if (!elt) return;
  var btn = elt.tagName === 'BUTTON' ? elt : elt.querySelector('button[type="submit"]');
  if (btn) btn.setAttribute('aria-busy', 'true');
  if (elt.getAttribute('hx-post') && elt.getAttribute('hx-post').indexOf('/test') !== -1) {
    var m = elt.getAttribute('hx-post').match(/\/panels\/(\d+)\/test/);
    if (m) {
      var box = document.getElementById('panel-test-' + m[1]);
      if (box) box.innerHTML = '<div class="alert-info">Testing connection…</div>';
    }
  }
});
document.body.addEventListener('htmx:afterRequest', function(e) {
  var elt = e.detail.elt;
  if (!elt) return;
  var btn = elt.tagName === 'BUTTON' ? elt : elt.querySelector('button[type="submit"]');
  if (btn) btn.removeAttribute('aria-busy');
});
</script>
</body>
</html>{{end}}
