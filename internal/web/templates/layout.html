{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hodhod Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<nav class="bg-white shadow p-4 mb-6">
  <div class="max-w-5xl mx-auto flex gap-4">
    <a href="/" class="font-bold">Hodhod</a>
    <a href="/payments/pending">Payments</a>
    <a href="/master/agents">Agents</a>
    <a href="/master/panels">Panels</a>
    <a href="/master/bots">Bots</a>
    <a href="/agent/plans">My Plans</a>
    <form method="post" action="/logout" class="ml-auto">
      <input type="hidden" name="_csrf" value="{{.CSRF}}">
      <button class="text-red-600">Logout</button>
    </form>
  </div>
</nav>
<main class="max-w-5xl mx-auto p-4">{{template "content" .}}</main>
</body>
</html>{{end}}
