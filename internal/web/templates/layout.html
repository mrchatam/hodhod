{{define "layout"}}<!DOCTYPE html>
<html lang="{{if .Lang}}{{.Lang}}{{else}}fa{{end}}" dir="{{if .IsRTL}}rtl{{else}}ltr{{end}}" class="h-full {{if eq .Theme "dark"}}dark{{end}}" data-theme="{{if .Theme}}{{.Theme}}{{else}}system{{end}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{T .Lang "app.name"}}</title>
  <link rel="stylesheet" href="/static/app.css?v={{cssVer}}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="/static/app.js?v={{cssVer}}" defer></script>
</head>
<body class="min-h-dvh flex flex-col">
<div class="min-h-dvh flex flex-1 min-w-0">
  {{template "sidebar" .}}
  <div class="flex-1 flex flex-col min-w-0">
    {{template "topbar" .}}
    <main class="flex-1 p-4 md:p-6 max-w-7xl w-full mx-auto pb-20 md:pb-6">
      {{template "flash" .}}
      {{template "content" .}}
    </main>
  </div>
</div>
{{template "mobile_sheet" .}}
<div id="sheet-backdrop" class="sheet-backdrop hidden" aria-hidden="true"></div>
{{template "bottom_nav" .}}
</body>
</html>{{end}}
