{{define "agent_plans.html"}}{{template "layout" .}}{{end}}
{{define "content"}}
<h1 class="text-2xl font-bold mb-4">My Plans</h1>
<ul class="mb-4">{{range .Plans}}<li>{{.Name}} - {{.PriceToman}} Toman</li>{{end}}</ul>
<form method="post" action="/agent/plans" class="bg-white p-4 rounded shadow grid gap-2">
  <input type="hidden" name="_csrf" value="{{.CSRF}}">
  <select name="bot_id">{{range .Bots}}<option value="{{.ID}}">Bot {{.Username}}</option>{{end}}</select>
  <select name="panel_id" required>
    <option value="">Select panel</option>
    {{range .PanelOptions}}
      <option value="{{.PanelID}}">Bot {{.BotID}} -> {{.PanelName}}</option>
    {{end}}
  </select>
  <input name="name" placeholder="Plan name" class="border p-2" required>
  <input name="duration_days" type="number" placeholder="Days" class="border p-2" required>
  <input name="volume_gb" type="number" placeholder="GB" class="border p-2" required>
  <input name="price_toman" type="number" placeholder="Price Toman" class="border p-2" required>
  <button class="bg-blue-600 text-white px-4 py-2 rounded">Add Plan</button>
</form>
{{end}}
