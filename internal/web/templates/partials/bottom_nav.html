{{define "bottom_nav"}}
<nav class="bottom-nav md:hidden" aria-label="{{T .Lang "nav.menu"}}">
  <a href="/" class="bottom-nav-item {{if eq .CurrentPath "/"}}bottom-nav-active{{end}}">
    <svg class="bottom-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
    <span>{{T .Lang "nav.dashboard"}}</span>
  </a>
  {{if .IsMaster}}
  <a href="/services" class="bottom-nav-item {{if eq .CurrentPath "/services"}}bottom-nav-active{{end}}">
    <svg class="bottom-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    <span>{{T .Lang "nav.services"}}</span>
  </a>
  {{else}}
  <a href="/customers" class="bottom-nav-item {{if or (eq .CurrentPath "/customers") (hasPrefix .CurrentPath "/agent/panels")}}bottom-nav-active{{end}}">
    <svg class="bottom-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    <span>{{T .Lang "nav.customers"}}</span>
  </a>
  {{end}}
  <a href="/payments/pending" class="bottom-nav-item {{if eq .CurrentPath "/payments/pending"}}bottom-nav-active{{end}}">
    <svg class="bottom-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
    <span>{{T .Lang "nav.payments"}}</span>
  </a>
  <button type="button" id="bottom-nav-more" class="bottom-nav-item">
    <svg class="bottom-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"/></svg>
    <span>{{T .Lang "nav.more"}}</span>
  </button>
</nav>
{{end}}
