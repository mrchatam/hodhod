{{define "content"}}
<h2 class="text-2xl font-bold text-slate-900 mb-6">My bots</h2>
<div class="grid lg:grid-cols-2 gap-6">
  <div class="space-y-3">{{range .Bots}}
  <div class="bg-white rounded-xl border p-4 flex justify-between">
    <div><p class="font-medium">@{{.Username}}</p><p class="text-xs text-slate-500">{{.Status}}</p></div>
    <a href="/agent/bots/{{.ID}}/settings" class="text-brand-600 text-sm">Settings</a>
  </div>{{end}}</div>
  {{if .Perms.ManageBot}}
  <form method="post" action="/agent/bots" class="bg-white rounded-xl border p-6 space-y-3 h-fit">
    <input type="hidden" name="_csrf" value="{{.CSRF}}">
    <input name="token" placeholder="Bot token" class="w-full border rounded-lg p-2" required>
    <button class="bg-brand-600 text-white px-4 py-2 rounded-lg">Add bot</button>
  </form>{{end}}
</div>
{{end}}
