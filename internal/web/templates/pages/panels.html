{{define "content"}}
<h2 class="text-2xl font-bold text-slate-900 mb-6">VPN Panels</h2>
<div class="grid lg:grid-cols-2 gap-6">
  <div class="space-y-3">{{range .Panels}}
  <div class="bg-white rounded-xl border p-4 flex justify-between items-center">
    <div><p class="font-medium">{{.Name}} <span class="text-xs text-slate-400">{{.Status}}</span></p><p class="text-xs text-slate-500">{{.Type}} · {{.BaseURL}}</p></div>
    <div class="space-x-2 text-sm">
      <a href="/master/panels/{{.ID}}" class="text-brand-600">Edit</a>
      <form class="inline" method="post" action="/master/panels/{{.ID}}/test"><input type="hidden" name="_csrf" value="{{$.CSRF}}"><button class="text-brand-600">Test</button></form>
      {{if eq .Status "active"}}<form class="inline" method="post" action="/master/panels/{{.ID}}/disable"><input type="hidden" name="_csrf" value="{{$.CSRF}}"><button class="text-red-600">Disable</button></form>{{end}}
    </div>
  </div>{{end}}</div>
  <form method="post" action="/master/panels" class="bg-white rounded-xl border p-6 space-y-3 h-fit">
    <input type="hidden" name="_csrf" value="{{.CSRF}}">
    <input name="name" placeholder="Name" class="w-full border rounded-lg p-2" required>
    <select name="type" class="w-full border rounded-lg p-2"><option value="marzban">Marzban</option><option value="xui">3x-ui</option></select>
    <input name="base_url" placeholder="Base URL" class="w-full border rounded-lg p-2" required>
    <input name="base_path" placeholder="Base path (xui)" class="w-full border rounded-lg p-2">
    <input name="username" placeholder="Username" class="w-full border rounded-lg p-2" required>
    <input name="password" type="password" placeholder="Password" class="w-full border rounded-lg p-2" required>
    <input name="api_token" type="password" placeholder="API token (xui, optional)" class="w-full border rounded-lg p-2">
    <button class="bg-brand-600 text-white px-4 py-2 rounded-lg">Add panel</button>
  </form>
</div>
{{end}}
