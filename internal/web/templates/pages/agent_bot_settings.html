{{define "content"}}
<h2 class="text-2xl font-bold text-slate-900 mb-2">Bot @{{.Bot.Username}}</h2>
<p class="text-sm text-slate-500 mb-4">Webhook: {{.WebhookStatus}} · <span class="font-mono text-xs">{{.WebhookURL}}</span></p>
<form method="post" action="/agent/bots/{{.Bot.ID}}/settings" class="bg-white rounded-xl border p-6 space-y-3 max-w-lg mt-4">
  <input type="hidden" name="_csrf" value="{{.CSRF}}">
  <input name="approver_tg_id" value="{{index .Settings "approver_tg_id"}}" placeholder="Approver Telegram ID" class="w-full border rounded-lg p-2">
  <input name="support_contact" value="{{index .Settings "support_contact"}}" placeholder="Support contact" class="w-full border rounded-lg p-2">
  <textarea name="welcome_text" class="w-full border rounded-lg p-2" rows="2" placeholder="Welcome message">{{index .Settings "welcome_text"}}</textarea>
  <textarea name="card_numbers" class="w-full border rounded-lg p-2" rows="2" placeholder="Card numbers for top-up">{{index .Settings "card_numbers"}}</textarea>
  <input name="warn_percent" value="{{index .Settings "warn_percent"}}" placeholder="Usage warn %" class="w-full border rounded-lg p-2">
  <input name="force_join_channel" value="{{index .Settings "force_join_channel"}}" placeholder="@channel to force join" class="w-full border rounded-lg p-2">
  <label class="block text-sm font-medium">New bot token (optional)
    <input name="token" type="password" class="mt-1 w-full border rounded-lg p-2" placeholder="Leave blank to keep current">
  </label>
  <button class="bg-brand-600 text-white px-4 py-2 rounded-lg">Save</button>
</form>
{{end}}
