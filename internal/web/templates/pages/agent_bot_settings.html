{{define "content"}}
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
  <div>
    <h2 class="text-2xl font-bold">@{{.Bot.Username}}</h2>
    <p class="text-sm opacity-60 mt-1">{{T .Lang "bot_settings.webhook"}}: {{.WebhookStatus}} · <span class="font-mono text-xs">{{.WebhookURL}}</span></p>
  </div>
  <a href="/agent/bots" class="btn btn-muted btn-sm">{{T .Lang "common.back"}}</a>
</div>

<form method="post" action="/agent/bots/{{.Bot.ID}}/settings" class="card p-6 space-y-4 max-w-lg">
  <input type="hidden" name="_csrf" value="{{.CSRF}}">
  <label class="form-field">
    <span class="form-label">{{T .Lang "bots.approver_id"}}</span>
    <input name="approver_tg_id" value="{{index .Settings "approver_tg_id"}}" class="form-input" placeholder="123456789">
  </label>
  <label class="form-field">
    <span class="form-label">{{T .Lang "bot_settings.support_contact"}}</span>
    <input name="support_contact" value="{{index .Settings "support_contact"}}" class="form-input">
  </label>
  <label class="form-field">
    <span class="form-label">{{T .Lang "bot_settings.welcome_message"}}</span>
    <textarea name="welcome_text" class="form-textarea" rows="2">{{index .Settings "welcome_text"}}</textarea>
  </label>
  <label class="form-field">
    <span class="form-label">{{T .Lang "bot_settings.card_numbers"}}</span>
    <textarea name="card_numbers" class="form-textarea" rows="2">{{index .Settings "card_numbers"}}</textarea>
  </label>
  <label class="form-field">
    <span class="form-label">{{T .Lang "bot_settings.warn_percent"}}</span>
    <input name="warn_percent" value="{{index .Settings "warn_percent"}}" class="form-input">
  </label>
  <label class="form-field">
    <span class="form-label">{{T .Lang "bot_settings.force_join"}}</span>
    <input name="force_join_channel" value="{{index .Settings "force_join_channel"}}" class="form-input" placeholder="@channel">
  </label>
  <label class="form-field">
    <span class="form-label">{{T .Lang "bot_settings.new_token"}} <span class="opacity-60 font-normal">({{T .Lang "common.optional"}})</span></span>
    <input name="token" type="password" class="form-input" placeholder="{{T .Lang "panel_edit.keep_current"}}">
  </label>
  <button type="submit" class="btn btn-primary">{{T .Lang "common.save"}}</button>
</form>
{{end}}
