{{define "content"}}
<h2 class="text-2xl font-bold text-slate-900 mb-6">Plans</h2>
<div class="grid lg:grid-cols-2 gap-6">
  <div class="bg-white rounded-xl border overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50"><tr><th class="p-3 text-left">Name</th><th class="p-3">GB</th><th class="p-3">Days</th><th class="p-3">Price</th><th class="p-3"></th></tr></thead>
      <tbody>
      {{range .Plans}}
      <tr class="border-t">
        <td class="p-3">{{.Name}} <span class="text-xs text-slate-400">{{.Status}}</span></td>
        <td class="p-3 text-center">{{.VolumeGB}}</td>
        <td class="p-3 text-center">{{.DurationDays}}</td>
        <td class="p-3 text-center">{{toman .PriceToman}} Toman</td>
        <td class="p-3 text-right">
          <details><summary class="btn btn-link btn-sm cursor-pointer">Edit</summary>
          <form method="post" action="/agent/plans/{{.ID}}" class="mt-2 space-y-1 text-left">
            <input type="hidden" name="_csrf" value="{{$.CSRF}}">
            <input type="hidden" name="bot_id" value="{{.BotID}}">
            <input name="name" value="{{.Name}}" class="form-input text-xs">
            <input name="volume_gb" type="number" value="{{.VolumeGB}}" class="form-input text-xs">
            <input name="duration_days" type="number" value="{{.DurationDays}}" class="form-input text-xs">
            <input name="price_toman" type="number" value="{{.PriceToman}}" class="form-input text-xs">
            <button type="submit" class="btn btn-secondary btn-sm">Save</button>
          </form>
          {{if eq .Status "active"}}<form method="post" action="/agent/plans/{{.ID}}/disable"><input type="hidden" name="_csrf" value="{{$.CSRF}}"><input type="hidden" name="bot_id" value="{{.BotID}}"><button type="submit" class="btn btn-danger btn-sm">Disable</button></form>{{end}}
          </details>
        </td>
      </tr>
      {{end}}
      </tbody>
    </table>
  </div>
  <form method="post" action="/agent/plans" class="bg-white rounded-xl border p-6 space-y-4 h-fit">
    <input type="hidden" name="_csrf" value="{{.CSRF}}">
    <select name="bot_id" class="form-input">{{range .Bots}}<option value="{{.ID}}">@{{.Username}}</option>{{end}}</select>
    <select name="panel_id" class="form-input">{{range .PanelOptions}}<option value="{{.PanelID}}">Bot {{.BotID}} → {{.PanelName}}</option>{{end}}</select>
    <input name="name" placeholder="Plan name" class="form-input" required>
    <input name="volume_gb" type="number" placeholder="Volume GB" class="form-input" required>
    <input name="duration_days" type="number" placeholder="Duration days" class="form-input" required>
    <input name="price_toman" type="number" placeholder="Price (Toman)" class="form-input" required>
    <button type="submit" class="btn btn-primary">Add plan</button>
  </form>
</div>
{{end}}
