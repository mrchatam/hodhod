{{define "content"}}
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
  <h2 class="text-2xl font-bold">{{T .Lang "account.password_title"}}</h2>
  <a href="/" class="btn btn-muted btn-sm">{{T .Lang "common.back"}}</a>
</div>

<form method="post" action="/account/password" class="card p-6 space-y-4 max-w-lg">
  <input type="hidden" name="_csrf" value="{{.CSRF}}">
  <label class="form-field">
    <span class="form-label">{{T .Lang "account.current_password"}}</span>
    <input name="current_password" type="password" class="form-input" required autocomplete="current-password">
  </label>
  <label class="form-field">
    <span class="form-label">{{T .Lang "account.new_password"}}</span>
    <input name="new_password" type="password" class="form-input" required minlength="8" autocomplete="new-password">
  </label>
  <label class="form-field">
    <span class="form-label">{{T .Lang "account.confirm_password"}}</span>
    <input name="confirm_password" type="password" class="form-input" required minlength="8" autocomplete="new-password">
  </label>
  <button type="submit" class="btn btn-primary">{{T .Lang "common.save"}}</button>
</form>
{{end}}
