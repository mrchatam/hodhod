{{define "content"}}
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
  <div>
    <h2 class="text-2xl font-bold">{{T .Lang "service_create.title"}}</h2>
  </div>
  <a href="/services" class="btn btn-muted btn-sm">{{T .Lang "common.back"}}</a>
</div>

<form method="post" action="/services" class="card p-6 max-w-lg space-y-4">
  <input type="hidden" name="_csrf" value="{{.CSRF}}">
  {{if .IsMaster}}
  <label class="form-field">
    <span class="form-label">{{T .Lang "service_create.agent"}}</span>
    <select name="agent_id" class="form-select" required>
      {{range .Agents}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
    </select>
  </label>
  {{end}}
  <label class="form-field">
    <span class="form-label">{{T .Lang "service_create.panel"}}</span>
    <select name="panel_id" class="form-select" required>
      {{range .Panels}}<option value="{{.ID}}">{{.Name}}</option>{{end}}
    </select>
  </label>
  <label class="form-field">
    <span class="form-label">{{T .Lang "service_create.label"}}</span>
    <input name="label" class="form-input" placeholder="{{T .Lang "service_create.label"}}">
  </label>
  <label class="form-field">
    <span class="form-label">{{T .Lang "service_create.contact"}} <span class="opacity-60 font-normal">({{T .Lang "common.optional"}})</span></span>
    <input name="contact" class="form-input">
  </label>
  <div class="grid grid-cols-2 gap-4">
    <label class="form-field">
      <span class="form-label">{{T .Lang "service_create.volume"}}</span>
      <input name="volume_gb" type="number" min="1" value="30" class="form-input" required>
    </label>
    <label class="form-field">
      <span class="form-label">{{T .Lang "service_create.duration"}}</span>
      <input name="duration_days" type="number" min="1" value="30" class="form-input" required>
    </label>
  </div>
  <button type="submit" class="btn btn-primary">{{T .Lang "common.create"}}</button>
</form>
{{end}}
