{{define "panels.html"}}{{template "layout" .}}{{end}}
{{define "content"}}
<h1 class="text-2xl font-bold mb-4">Panels</h1>
<ul class="mb-6">{{range .Panels}}<li>{{.Name}} - {{.Type}} - {{.BaseURL}}
  <form class="inline" method="post" action="/master/panels/{{.ID}}/test">
    <input type="hidden" name="_csrf" value="{{$.CSRF}}">
    <button type="submit">Test</button>
  </form>
</li>{{end}}</ul>
<form method="post" action="/master/panels" class="bg-white p-4 rounded shadow grid gap-2">
  <input type="hidden" name="_csrf" value="{{.CSRF}}">
  <input name="name" placeholder="Name" class="border p-2" required>
  <select name="type" class="border p-2"><option value="marzban">marzban</option><option value="xui">xui</option></select>
  <input name="base_url" placeholder="Base URL" class="border p-2" required>
  <input name="base_path" placeholder="Base path (xui)" class="border p-2">
  <input name="username" placeholder="Username" class="border p-2" required>
  <input name="password" type="password" placeholder="Password" class="border p-2" required>
  <input name="api_token" type="password" placeholder="API token (optional)" class="border p-2">
  <button class="bg-blue-600 text-white px-4 py-2 rounded">Add Panel</button>
</form>
{{end}}
