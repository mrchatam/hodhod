# App uses host network (same egress as host curl). Postgres stays on the Docker bridge.
# Connect via 127.0.0.1:${HODHOD_DB_HOST_PORT} — see docker-compose.db-localhost.yml.
services:
  hodhod-app:
    network_mode: host
    environment:
      HTTP_ADDR: ":${HTTP_PORT:-8080}"
      DATABASE_DSN: postgres://hodhod:${DB_PASSWORD:-hodhod}@127.0.0.1:${HODHOD_DB_HOST_PORT:-15432}/hodhod?sslmode=disable
