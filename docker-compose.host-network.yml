# Overlay when Docker bridge egress is broken (host curl works, container TCP times out).
# Set HODHOD_HOST_NETWORK=1 in .env — app uses the host network stack; Postgres on 127.0.0.1:5432.
services:
  hodhod-db:
    ports:
      - "127.0.0.1:5432:5432"

  hodhod-app:
    network_mode: host
    environment:
      DATABASE_DSN: postgres://hodhod:${DB_PASSWORD:-hodhod}@127.0.0.1:5432/hodhod?sslmode=disable
